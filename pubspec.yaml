name: registro_mis_gastos_mobile
description: Mobile app para registrar y gestionar gastos personales.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.0
  hydrated_bloc: ^11.0.0
  equatable: ^2.0.7

  # Networking
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # Local Storage
  sqflite: ^2.4.1
  shared_preferences: ^2.3.5
  path_provider: ^2.1.5
  flutter_secure_storage: ^10.0.0

  # Authentication
  google_sign_in: ^6.2.2
  flutter_appauth: ^8.0.1

  # UI Components
  flutter_slidable: ^3.1.1
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Forms & Validation
  formz: ^0.7.0

  # Utils
  uuid: ^4.5.1
  connectivity_plus: ^6.1.4
  get_it: ^8.0.3
  dartz: ^0.10.1

  # Icons
  cupertino_icons: ^1.0.8
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - .env
