name: registro_mis_gastos_mobile
description: Mobile app para registrar y gestionar gastos personales.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  hydrated_bloc: ^9.1.2
  equatable: ^2.0.5

  # Networking
  dio: ^5.3.3
  pretty_dio_logger: ^1.1.1

  # Local Storage
  sqflite: ^2.3.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  flutter_secure_storage: ^1.1.1

  # Authentication
  google_sign_in: ^6.1.4
  flutter_appauth: ^6.0.1

  # UI Components
  flutter_slidable: ^3.0.1
  intl: ^0.18.1
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0

  # Forms & Validation
  formz: ^0.6.1
  formz_input: ^0.4.0

  # Utils
  uuid: ^4.2.1
  connectivity_plus: ^5.0.2
  get_it: ^7.6.4
  dartz: ^0.10.1

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  bloc_test: ^9.1.5
  mocktail: ^1.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
